name: fathom
description: A production-ready AI Chat mobile application using Gemini, Firebase, Clean Architecture, and Provider.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1
  google_generative_ai: ^0.4.4
  uuid: ^4.3.3
  intl: ^0.19.0
  share_plus: ^9.0.0
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
